# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    defaults:
      run:
        working-directory: code

    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        path: 'code'
    - name: Check out grammars
      uses: actions/checkout@v4
      with:
        repository: 'nl-utwente-groove/grammars'
        path: 'grammars'
    - name: Check out samples
      uses: actions/checkout@v4
      with:
        repository: 'nl-utwente-groove/samples'
        path: 'samples'
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Retrieve VERSION from file
      run: echo "VERSION=$(<src/main/resources/nl/utwente/groove/resource/version/GROOVE_VERSION)" >> $GITHUB_ENV
    - name: Build with Maven
      run: mvn -B -Drevision=$VERSION clean package -DskipTests --file pom.xml
    - name: Run full test suite (including slow tests)
      run: mvn -B -Drevision=$VERSION test -Dexcluded.test.groups= --file pom.xml
